<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wechat-router 管理</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #fff; --border: #e0e0e0;
    --primary: #1976d2; --danger: #d32f2f;
    --user-bg: #e3f2fd; --bot-bg: #f1f8e9;
    --text: #212121; --muted: #757575;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--primary); color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: 0.85rem; opacity: 0.8; flex: 1; }
  #refresh-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  #refresh-btn:hover { background: rgba(255,255,255,0.35); }
  .layout { display: flex; height: calc(100vh - 52px); }
  .sidebar { width: 340px; min-width: 240px; border-right: 1px solid var(--border); background: var(--card); overflow-y: auto; }
  .main { flex: 1; overflow-y: auto; padding: 20px; }
  .sidebar-header { padding: 12px 16px; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .session-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .session-item:hover { background: #f0f4ff; }
  .session-item.selected { background: #e8f0fe; border-left: 3px solid var(--primary); }
  .session-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .session-status.online { background: #4caf50; }
  .session-status.offline { background: #bdbdbd; }
  .session-key { font-size: 0.85rem; font-weight: 600; color: var(--primary); word-break: break-all; }
  .session-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 0.9rem; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .detail-title { font-size: 1rem; font-weight: 600; word-break: break-all; }
  .detail-meta { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .delete-btn { background: var(--danger); color: #fff; border: none; padding: 7px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; margin-left: 12px; }
  .delete-btn:hover { opacity: 0.85; }
  .messages { display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; }
  .msg.user { background: var(--user-bg); align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.assistant { background: var(--bot-bg); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; text-align: right; }
  .msg.assistant .msg-meta { text-align: left; }
  .placeholder { color: var(--muted); text-align: center; margin-top: 80px; font-size: 0.95rem; }
</style>
</head>
<body>
<header>
  <h1>wechat-router 管理</h1>
  <span id="status-text">加载中...</span>
  <button id="refresh-btn">刷新</button>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">会话列表</div>
    <div id="session-list"></div>
  </div>
  <div class="main" id="main-panel">
    <p class="placeholder">← 选择左侧会话查看消息记录</p>
  </div>
</div>
<script>
// All user-supplied data is inserted via textContent (not innerHTML) to prevent XSS.
// Only structural HTML (tags with no user data) uses createElement + appendChild.

var sessions = [];
var selectedKey = null;

document.getElementById('refresh-btn').addEventListener('click', loadSessions);

function loadSessions() {
  fetch('/api/sessions').then(function(r){ return r.json(); }).then(function(data){
    sessions = data || [];
    renderList();
    var activeCount = sessions.filter(function(s){ return s.active; }).length;
    document.getElementById('status-text').textContent = activeCount + ' 个活跃 / ' + sessions.length + ' 个会话';
    if (selectedKey && sessions.some(function(s){ return s.key === selectedKey; })) {
      loadDetail(selectedKey);
    }
  }).catch(function(){
    document.getElementById('status-text').textContent = '加载失败';
  });
}

function shortKey(k) {
  return k.length > 30 ? k.slice(0, 12) + '…' + k.slice(-10) : k;
}

function relTime(s) {
  if (!s) return '—';
  var diff = Math.floor((Date.now() - new Date(s)) / 1000);
  if (diff < 60) return diff + 's前';
  if (diff < 3600) return Math.floor(diff/60) + 'm前';
  if (diff < 86400) return Math.floor(diff/3600) + 'h前';
  return Math.floor(diff/86400) + 'd前';
}

function fmtTime(s) {
  if (!s) return '—';
  return new Date(s).toLocaleString('zh-CN', { hour12: false });
}

function renderList() {
  var el = document.getElementById('session-list');
  while (el.firstChild) el.removeChild(el.firstChild);

  if (!sessions.length) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '暂无会话记录';
    el.appendChild(empty);
    return;
  }

  sessions.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'session-item' + (s.key === selectedKey ? ' selected' : '');

    var keyEl = document.createElement('div');
    keyEl.className = 'session-key';
    var dot = document.createElement('span');
    dot.className = 'session-status ' + (s.active ? 'online' : 'offline');
    keyEl.appendChild(dot);
    var keyText = document.createTextNode(shortKey(s.key)); // textNode — safe
    keyEl.appendChild(keyText);

    var metaEl = document.createElement('div');
    metaEl.className = 'session-meta';
    var statusLabel = s.active ? '活跃' : '历史';
    metaEl.textContent = statusLabel + ' · ' + (s.agentID || '—') + ' · ' + relTime(s.lastActivity); // textContent — safe

    item.appendChild(keyEl);
    item.appendChild(metaEl);
    item.addEventListener('click', function(){ selectSession(s.key); });
    el.appendChild(item);
  });
}

function selectSession(key) {
  selectedKey = key;
  renderList();
  loadDetail(key);
}

function loadDetail(key) {
  var panel = document.getElementById('main-panel');
  while (panel.firstChild) panel.removeChild(panel.firstChild);
  var loading = document.createElement('p');
  loading.className = 'placeholder';
  loading.textContent = '加载中...';
  panel.appendChild(loading);

  fetch('/api/sessions?key=' + encodeURIComponent(key))
    .then(function(r){
      if (r.status === 404) throw new Error('not_found');
      return r.json();
    })
    .then(renderDetail)
    .catch(function(e){
      while (panel.firstChild) panel.removeChild(panel.firstChild);
      var p = document.createElement('p');
      p.className = 'placeholder';
      p.textContent = e.message === 'not_found' ? '会话不存在' : '加载失败';
      panel.appendChild(p);
    });
}

function renderDetail(d) {
  var panel = document.getElementById('main-panel');
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  // Header row
  var hdr = document.createElement('div');
  hdr.className = 'detail-header';

  var info = document.createElement('div');
  var titleEl = document.createElement('div');
  titleEl.className = 'detail-title';
  titleEl.textContent = d.key; // textContent — safe
  var metaEl = document.createElement('div');
  metaEl.className = 'detail-meta';
  metaEl.textContent = 'Agent: ' + (d.agentID || '—') + ' · 创建: ' + fmtTime(d.createdAt); // textContent — safe
  info.appendChild(titleEl);
  info.appendChild(metaEl);

  var delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '删除会话';
  delBtn.addEventListener('click', function(){ deleteSession(d.key); });

  hdr.appendChild(info);
  hdr.appendChild(delBtn);
  panel.appendChild(hdr);

  // Messages
  var msgsEl = document.createElement('div');
  msgsEl.className = 'messages';

  var messages = d.messages || [];
  if (!messages.length) {
    var empty = document.createElement('p');
    empty.className = 'placeholder';
    empty.style.marginTop = '20px';
    empty.textContent = '暂无消息记录';
    msgsEl.appendChild(empty);
  } else {
    messages.forEach(function(m) {
      var msgEl = document.createElement('div');
      msgEl.className = 'msg ' + (m.role === 'user' ? 'user' : 'assistant');

      var pre = document.createElement('pre');
      pre.textContent = m.content; // textContent — XSS-safe

      var metaEl2 = document.createElement('div');
      metaEl2.className = 'msg-meta';
      metaEl2.textContent = (m.role === 'user' ? '用户' : 'AI') + ' · ' + fmtTime(m.createdAt); // textContent — safe

      msgEl.appendChild(pre);
      msgEl.appendChild(metaEl2);
      msgsEl.appendChild(msgEl);
    });
  }
  panel.appendChild(msgsEl);
}

function deleteSession(key) {
  if (!confirm('确认删除会话 "' + shortKey(key) + '" 及其全部消息历史？')) return;
  fetch('/api/sessions?key=' + encodeURIComponent(key), { method: 'DELETE' })
    .then(function(){
      selectedKey = null;
      var panel = document.getElementById('main-panel');
      while (panel.firstChild) panel.removeChild(panel.firstChild);
      var p = document.createElement('p');
      p.className = 'placeholder';
      p.textContent = '会话已删除';
      panel.appendChild(p);
      loadSessions();
    });
}

loadSessions();
setInterval(loadSessions, 30000);
</script>
</body>
</html>
