# wechat-router-go configuration

[global]
# Data directory for tokens, sessions, logs
storage_dir = "~/.wechat-router-go"
# Log level: debug, info, warn, error
log_level = "info"

# ─────────────────────────────────────────
# Bot instances (define one or more)
# ─────────────────────────────────────────

[[bot]]
# Unique instance name
name = "coding-bot"
# Default agent preset (optional). If omitted, users select via /use command in chat.
# agent = "claude"

[bot.wechat]
# Usually no need to change these
# base_url = "https://ilinkai.weixin.qq.com"
# cdn_base_url = "https://novac2c.cdn.weixin.qq.com/c2c"

[bot.agent_config]
# Override agent command (leave empty to use preset)
# command = "npx"
# args = ["tsx", "./my-agent.ts"]
# Working directory for the agent process
cwd = "."
# Extra environment variables
# env = { ANTHROPIC_API_KEY = "sk-..." }
# Forward agent thinking to WeChat
show_thoughts = false

[bot.session]
# Session idle timeout (Go duration: 1h, 30m, 24h)
idle_timeout = "24h"
# Maximum concurrent user sessions
max_concurrent = 10
# Max messages to restore as context on session resume (0 = disable)
history_limit = 20
# Max pending messages per session queue (default: 3; excess is rejected with a notice)
# queue_size = 3
# Max time a message waits in queue before being discarded (default: 2m)
# queue_timeout = "2m"

[bot.group]
# Enable group chat support
enabled = true
# Trigger mode: "@bot", "keyword:ask", "all"
trigger = "@bot"
# Session mode: "per_group" (one session per group)
session_mode = "per_group"

[bot.daemon]
# Run in background after login
enabled = false
# pid_file = "~/.wechat-router-go/coding-bot.pid"
# log_file = "~/.wechat-router-go/coding-bot.log"

[bot.web]
# Enable the built-in web management UI (default: disabled)
# Access at http://127.0.0.1:8080 to view sessions and message history
enabled = false
# addr = "127.0.0.1:8970"

# ─────────────────────────────────────────
# Custom agent presets (extend built-in ones)
# ─────────────────────────────────────────

# [agents.my-agent]
# label = "My Custom Agent"
# description = "A custom ACP agent"
# command = "npx"
# args = ["tsx", "./agent.ts"]
# env = { DEBUG = "1" }
